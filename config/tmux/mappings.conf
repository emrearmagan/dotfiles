# change the prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind v
bind v copy-mode
# Use Vim-style keybindings inside tmux copy mode (instead of default emacs-style keys)
set-window-option -g mode-keys vi
# Start text selection (like Vim visual mode) When in copy mode, press 'v' to begin selecting text
bind-key -T copy-mode-vi v send -X begin-selection
# Copy (yank) the selected text When in copy mode, press 'y' to copy selection to tmux buffer
bind-key -T copy-mode-vi y send -X copy-selection

# Enable vi-style key bindings for navigating and selecting text in copy mode
set -g status-keys vi
setw -g mode-keys vi
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"

set -g @menus_trigger '/'

# ----- Pane management -----
bind c command-prompt -p "New window name:" -I "#{b:pane_current_path}" "new-window -n '%%' -c '#{pane_current_path}'"
bind | split-window -h -c "#{pane_current_path}"  # Split horizontally
bind _ split-window -v -p 30 -c "#{pane_current_path}"  # Split vertically

# Resize panes in increments of 5
bind-key -r J resize-pane -D 5   # Resize down
bind-key -r K resize-pane -U 5   # Resize up
bind-key -r H resize-pane -L 5   # Resize left
bind-key -r L resize-pane -R 5   # Resize right

# ----- Navigation -----
# Vim-style navigation between panes
bind -r h previous-window
bind -r l next-window
bind j select-pane -D         # Move to below pane
bind k select-pane -U         # Move to above pane

set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ bindings

# Disable Alt/Meta navigation because they conflict with aerospace 
unbind -n M-h
unbind -n M-j
unbind -n M-k
unbind -n M-l

# Use Alt+arrow keys to switch panes without the prefix key
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Shift+arrow keys to switch between windows
bind -n S-Left  previous-window
bind -n S-Right next-window

bind -n C-H previous-window
bind -n C-L next-window

# Always keep window numbers sequential after closing one
set -g renumber-windows on
