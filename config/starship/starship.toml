format = "$sudo$directory$git_branch$git_status $character"
right_format = "$golang$php$nodejs$swift$docker_context$package$jobs$battery"

palette = "catppuccin_mocha"

[directory]
style = "bold blue"
format = "[$path]($style)"
truncation_length = 0
truncate_to_repo = false
read_only = " ´Çú"

[character]
success_symbol = "ÔØ»"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[N](bold purple) "  # normal mode indicator (no redraws)

[git_branch]
symbol = "¯éá"
style = "bold teal"
format = ' [(\($symbol $branch\))]($style)'

[git_status]
format = " [($all_status$ahead_behind)]($style)"
style = "red"
conflicted = "ÔÜö"
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
untracked = "?"
stashed = "Ôëí"
modified = "~"
staged = "+"
renamed = "┬╗"
deleted = "Ô£ÿ"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "Ôûê"
charging_symbol = "[Ôåæ](italic bold green)"
discharging_symbol = "Ôåô"
unknown_symbol = "Ôûæ"
empty_symbol = "Ôûâ"

[[battery.display]]
threshold = 20
style = "italic bold red"


########################################
# Languages
########################################

[golang]
symbol = "¯ÿº "
style = "bold sky"  # sky blue (Catppuccin blue)
format = " [$symbol($version)]($style)"
detect_files = ["go.mod"]

[nodejs]
symbol = "¯£ÿ "
style = "green"
format = ' [$symbol($version)]($style)'
detect_files = ["package.json"]

[php]
symbol = "¯ÿê "
style = "lavender"
format = ' [$symbol($version)]($style)'
detect_files = ["composer.json"]

[swift]
symbol = "¯Øò "
style = "red"
format = ' [$symbol($version)]($style)'
detect_files = ["Package.swift"]

[docker_context]
symbol = "´îê "
style = "teal"
format = ' [$symbol$context]($style)'
only_with_files = true
detect_files = ["Dockerfile", "docker-compose.yml"]

[c]
symbol = "¯ÿ× "
style = "sky"
format = " [$symbol($version)]($style)"
detect_files = ["Makefile", "CMakeLists.txt"]

[java]
symbol = "¯ëû "
style = "peach"
format = " [$symbol($version)]($style)"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts"]

[python]
symbol = "¯êÁ "
style = "yellow"
format = " [$symbol($version)]($style)"
detect_files = ["pyproject.toml", "requirements.txt", "Pipfile"]

[rust]
symbol = "¯Üï "
style = "maroon"
format = " [$symbol($version)]($style)"
detect_files = ["Cargo.toml"]

[jobs]
symbol = "´éà "
style = "yellow"
format = " [$symbol$number]($style)"

[package]
disabled = false
symbol = "´úû "
style = "teal"
format = " [$symbol$version]($style)"

